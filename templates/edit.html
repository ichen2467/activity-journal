<!DOCTYPE html>
<html>
<head>
    <title>Edit Activity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="mb-3">Edit Activity</h2>

        <form method="POST">
            <input type="text" name="activity" class="form-control mb-3" value="{{ activity[1] }}" required>
            <button class="btn btn-success w-100">Save Changes</button>
        </form>

        <a href="/?filter={{ filter_type }}" class="btn btn-link mt-3">Back</a>

    </div>
</div>

</body>
</html>
